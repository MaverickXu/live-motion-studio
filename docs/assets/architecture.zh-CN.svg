  <text x="88" y="104" fill="#151722" font-family="Inter,Segoe UI,sans-serif" font-size="34" font-weight="760">Live Motion Studio 架构</text>
  <text x="88" y="139" fill="#697084" font-family="Inter,Segoe UI,sans-serif" font-size="18">为实况照片转换自动选择浏览器或后端链路</text>

  <rect x="88" y="190" width="280" height="250" rx="22" fill="#EEF7FB" stroke="#B9DDEB"/>
