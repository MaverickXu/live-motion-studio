  <text x="120" y="344" fill="#3F4656" font-family="Inter,Segoe UI,sans-serif" font-size="17">• 合成安卓动态 JPG</text>
  <text x="120" y="378" fill="#3F4656" font-family="Inter,Segoe UI,sans-serif" font-size="17">• 桌面端 WASM 链路</text>

  <rect x="460" y="190" width="280" height="250" rx="22" fill="#EEEDFF" stroke="#C9C3FF"/>
  <text x="492" y="238" fill="#5F57D8" font-family="Inter,Segoe UI,sans-serif" font-size="22" font-weight="760">FastAPI + FFmpeg</text>
  <text x="492" y="276" fill="#3F4656" font-family="Inter,Segoe UI,sans-serif" font-size="17">• 移动端安全降级</text>
  <text x="492" y="310" fill="#3F4656" font-family="Inter,Segoe UI,sans-serif" font-size="17">• 写入 iOS MOV 元数据</text>
  <text x="492" y="344" fill="#3F4656" font-family="Inter,Segoe UI,sans-serif" font-size="17">• URL 与 m3u8 解析</text>
  <text x="492" y="378" fill="#3F4656" font-family="Inter,Segoe UI,sans-serif" font-size="17">• 限流与进程保护</text>

  <rect x="832" y="190" width="280" height="250" rx="22" fill="#F0F8F4" stroke="#B9E3D0"/>
