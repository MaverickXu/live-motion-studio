  <text x="864" y="344" fill="#3F4656" font-family="Inter,Segoe UI,sans-serif" font-size="17">• iOS 原生分享保存</text>
  <text x="864" y="378" fill="#3F4656" font-family="Inter,Segoe UI,sans-serif" font-size="17">• 直接下载</text>

